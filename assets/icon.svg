<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0D1B3E"/>

  <!-- Document body -->
  <rect x="124" y="72" width="264" height="332" rx="18" fill="#FFFFFF"/>

  <!-- Folded corner triangle (dark overlay) -->
  <path d="M324 72 L388 136 L324 136 Z" fill="#0D1B3E" opacity="0.18"/>
  <!-- Folded corner crease line -->
  <path d="M324 72 L324 136 L388 136" fill="none" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round"/>

  <!-- Header lines (document text) -->
  <rect x="156" y="112" width="136" height="13" rx="6" fill="#1F4E79" opacity="0.25"/>
  <rect x="156" y="136" width="100" height="9"  rx="4" fill="#1F4E79" opacity="0.15"/>

  <!-- Bar chart area baseline -->
  <rect x="148" y="368" width="216" height="5" rx="2.5" fill="#1F4E79" opacity="0.18"/>

  <!-- Bar: col 1 — blue -->
  <rect x="160" y="290" width="38" height="78" rx="7" fill="#2E75B6"/>
  <!-- Bar: col 2 — teal -->
  <rect x="213" y="240" width="38" height="128" rx="7" fill="#16A085"/>
  <!-- Bar: col 3 — green (tallest) -->
  <rect x="266" y="200" width="38" height="168" rx="7" fill="#27AE60"/>
  <!-- Bar: col 4 — amber -->
  <rect x="319" y="262" width="38" height="106" rx="7" fill="#F39C12"/>

  <!-- Trend line over bars -->
  <polyline
    points="179,268 232,218 285,176 338,240"
    fill="none"
    stroke="#79C0FF"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"/>

  <!-- Trend dots -->
  <circle cx="179" cy="268" r="7" fill="#79C0FF"/>
  <circle cx="232" cy="218" r="7" fill="#79C0FF"/>
  <circle cx="285" cy="176" r="7" fill="#79C0FF"/>
  <circle cx="338" cy="240" r="7" fill="#79C0FF"/>

  <!-- Medical cross (top-right of document) -->
  <rect x="298" y="100" width="10" height="30" rx="4" fill="#E74C3C" opacity="0.85"/>
  <rect x="288" y="110" width="30" height="10" rx="4" fill="#E74C3C" opacity="0.85"/>
</svg>
